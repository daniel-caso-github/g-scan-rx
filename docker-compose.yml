services:
  app-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gscan
      POSTGRES_PASSWORD: gscan
      POSTGRES_DB: gscan_rx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gscan -d gscan_rx"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file:
      - app.env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      app-db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn src.interfaces.api.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
    depends_on:
      - app

volumes:
  pgdata:
