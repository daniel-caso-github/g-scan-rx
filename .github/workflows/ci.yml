name: CI

# Quality gate for every push and pull request.
# Two independent jobs:
#   - backend:  builds the Docker image and runs pytest + ruff (offline-first).
#   - frontend: installs deps and runs the oxlint linter + the production build (type-check).
on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: mirrors the documented dev workflow
  #   docker compose run --rm app pytest -v
  #   docker compose run --rm app ruff check src tests
  #
  # The test suite is offline-first: VLM/LLM/HTTP are mocked and the DB test
  # (tests/infrastructure/test_catalog_repository.py) patches SQLAlchemy in
  # sys.modules, so NO Postgres/pgvector service is required here. Settings has
  # safe defaults for every field, so the missing app.env does not break import.
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build only the `app` image once and reuse it for both steps below.
      - name: Build app image
        run: docker compose build app

      - name: Ruff (lint)
        run: docker compose run --rm --no-deps app ruff check src tests

      - name: Pytest (offline-first)
        run: docker compose run --rm --no-deps app pytest -v

  # ---------------------------------------------------------------------------
  # Frontend: lint + build (build runs `tsc -b`, so it also type-checks).
  # Uses `npm ci` when a lockfile exists, otherwise falls back to `npm install`.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint (oxlint)
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build
